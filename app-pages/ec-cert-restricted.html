<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Force desktop-like width so WebView doesn't zoom -->
  <meta name="viewport" content="width=980, initial-scale=0.3, maximum-scale=1.0, minimum-scale=0.3, user-scalable=no" />
  <title>Certificate Notice</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background: linear-gradient(160deg,#ffffff,#256489);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* fixed-width inner container */
    .page {
      width: 980px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .notice-wrap {
      width: 100%;
      max-width: 480px;
      background:#fff;
      border-radius: 12px;
      padding:24px;
      box-shadow:0 4px 16px rgba(0,0,0,0.15);
      text-align:center;
    }

    .icon{
      margin:0 auto 16px auto;
      width:64px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background: rgba(37,100,137,0.1);
    }
    .icon svg{width:36px;height:36px;stroke:#256489}

    h1{
      font-size:20px;
      margin-bottom:8px;
      font-weight:600;
      color:#111;
    }

    p{
      font-size:16px;
      color:#555;
      margin-bottom:20px;
    }

    .actions button{
      padding:10px 16px;
      border:none;
      border-radius:8px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-primary{
      background:#256489;
      color:#fff;
      width:100%;
    }

    footer{
      margin-top:16px;
      font-size:14px;
      color:#888;
    }
  </style>
</head>
<body>
  <div class="page">
    <main role="main" aria-labelledby="notice-title">
      <section class="notice-wrap" role="region" aria-label="Certificate notice">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="6" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.2" opacity="0.9"/>
            <path d="M8 10V8a4 4 0 018 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 13v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 id="notice-title">Certificate view is disabled</h1>
        <p>For security reasons certificate view has been restricted. If you need further assistance, please contact us.</p>
        <footer>Reference: Security Policy • ID: <span id="ref">#CERT-403</span></footer>
      </section>
    </main>
  </div>
</body>
</html>

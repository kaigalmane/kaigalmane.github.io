<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Notice</title>
  <style>
    :root{
      --bg1: #ffffff;
      --bg2: #256489;
      --accent: #256489;
      --muted: #555;
      --radius: 12px;
      --maxWidth: 480px;
    }

    *{box-sizing:border-box; margin:0; padding:0}
    body{
      min-height:100vh;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background: linear-gradient(160deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      color:#222;
    }

    .notice-wrap{
      width:100%;
      max-width:var(--maxWidth);
      background:#fff;
      border-radius: var(--radius);
      padding:24px;
      box-shadow:0 4px 16px rgba(0,0,0,0.15);
      text-align:center;
    }

    .icon{
      margin:0 auto 16px auto;
      width:64px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background: rgba(37,100,137,0.1);
    }
    .icon svg{width:36px;height:36px;stroke:var(--accent)}

    h1{
      font-size:1.25rem;
      margin-bottom:8px;
      font-weight:600;
      color:#111;
    }

    p{
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:20px;
    }

    .actions button{
      padding:10px 16px;
      border:none;
      border-radius:8px;
      font-size:0.95rem;
      font-weight:600;
      cursor:pointer;
    }

    .btn-primary{
      background: var(--accent);
      color:#fff;
      width:100%;
    }

    footer{
      margin-top:16px;
      font-size:0.75rem;
      color:#888;
    }
  </style>
</head>
<body>
  <main role="main" aria-labelledby="notice-title">
    <section class="notice-wrap" role="region" aria-label="Certificate notice">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="6" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.2" opacity="0.9"/>
          <path d="M8 10V8a4 4 0 018 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 13v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 id="notice-title">Certificate view is temporarily disabled</h1>
      <p>For security reasons certificate view has been temporarily restricted. If you need further assistance, please contact us.</p>
      <div class="actions">
        <button class="btn-primary" onclick="contact()" aria-label="Contact us">Contact us</button>
      </div>
      <footer>Reference: Security Policy • ID: <span id="ref">#CERT-403</span></footer>
    </section>
  </main>

  <script>
    function contact(){
      window.location.href = 'mailto:contact@kaigalmaneapps.com?subject=Certificate%20view%20blocked&body=Reason:%20ID%20'+encodeURIComponent(document.getElementById('ref').textContent);
    }
  </script>
</body>
</html>
